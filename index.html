<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtítulos en Tiempo Real</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🎤</text></svg>">
</head>
<body>
    <div id="app-container">
        <div id="subtitles-container">
            <p id="subtitles">Presiona "Iniciar" para comenzar a transcribir...</p>
        </div>
        <div id="status-bar">
            <p id="status">Estado: Inactivo</p>
        </div>

        <div class="control-group">
            <label for="audio-viz-toggle">
                <input type="checkbox" id="audio-viz-toggle"> Visualizador de Audio
            </label>
        </div>

        <div class="control-group">
            <label for="rainbow-mode">
                <input type="checkbox" id="rainbow-mode"> Modo Arcoíris
            </label>
        </div>
        <div id="controls">
            <button id="toggle-btn">Iniciar</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
