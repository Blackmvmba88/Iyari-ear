<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Rain - Visualizador</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🌧️</text></svg>">
</head>
<body>
    <!-- Panel de Controles -->
    <div id="controls-panel">
        <h3>Controles Matrix Rain</h3>

        <div class="control-group">
            <label for="color-picker">Color Principal:</label>
            <input type="color" id="color-picker" value="#00ff00">
            <span class="color-preview"></span>
        </div>

        <div class="control-group">
            <label for="audio-viz-toggle">
                <input type="checkbox" id="audio-viz-toggle"> Visualizador de Audio
            </label>
        </div>

        <div class="control-group">
            <label for="rainbow-mode">
                <input type="checkbox" id="rainbow-mode"> Modo Arcoíris
            </label>
        </div>

        <div class="control-group">
            <label for="font-size">Tamaño de Fuente: <span id="font-size-value">16</span>px</label>
            <input type="range" id="font-size" min="8" max="32" value="16" step="2">
        </div>

        <div class="control-group">
            <label for="speed">Velocidad: <span id="speed-value">30</span></label>
            <input type="range" id="speed" min="5" max="100" value="30" step="5">
        </div>

        <div class="control-group">
            <label for="density">Densidad: <span id="density-value">0.975</span></label>
            <input type="range" id="density" min="0.9" max="0.999" value="0.975" step="0.005">
        </div>

        <fieldset class="char-set-fieldset">
            <legend>Conjunto de Caracteres</legend>
            <div class="radio-group">
                <label><input type="radio" name="char-set" value="katakana" checked> Katakana (Clásico)</label>
                <label><input type="radio" name="char-set" value="latin"> Latino + Números</label>
                <label><input type="radio" name="char-set" value="binary"> Binario</label>
                <label><input type="radio" name="char-set" value="mix"> Mezclado</label>
            </div>
        </fieldset>

        <div class="control-group">
            <button id="fullscreen-btn">Pantalla Completa</button>
            <button id="reset-btn">Reiniciar</button>
        </div>

        <div class="control-group">
            <button id="toggle-controls">Ocultar Controles</button>
        </div>
    </div>

    <!-- Canvas Principal -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Scripts -->
    <script src="js/matrix.js"></script>
</body>
</html>
